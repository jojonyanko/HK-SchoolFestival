<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>学園祭・暗号通信システム</title>
    <style>
        /* 全体のデザイン（黒背景に緑文字でハッカー風に） */
        body {
            background-color: #0a0a0a;
            color: #00ff00;
            font-family: 'Courier New', monospace;
            text-align: center;
            margin-top: 50px;
        }
        .container {
            border: 2px solid #00ff00;
            padding: 40px;
            display: inline-block;
            border-radius: 10px;
            min-width: 400px;
            background-color: #111;
        }
        /* 入力欄のデザイン */
        input[type="text"] {
            background-color: #000;
            color: #00ff00;
            border: 1px solid #00ff00;
            font-size: 24px;
            padding: 10px;
            width: 80%;
            margin-bottom: 20px;
            text-align: center;
        }
        /* 暗号が表示される部分のデザイン */
        #display-area {
            font-size: 64px; /* 文字を大きく */
            min-height: 80px;
            letter-spacing: 10px; /* 文字の間隔をあける */
            text-shadow: 0 0 10px #00ff00; /* 光るエフェクト */
        }
        /* ボタンのデザイン */
        .mode-switch {
            margin-bottom: 30px;
        }
        button {
            background-color: #003300;
            color: #00ff00;
            border: 1px solid #00ff00;
            padding: 15px 30px;
            cursor: pointer;
            font-size: 18px;
            margin: 0 10px;
            border-radius: 5px;
        }
        button:hover {
            background-color: #005500;
        }
    </style>
</head>
<body>

    <h1>-- 暗号システム --</h1>

    <!-- モード選択ボタン -->
    <div class="mode-switch" id="mode-selection">
        <button onclick="setMode('input')">入力用タブレットにする</button>
        <button onclick="setMode('display')">表示用タブレットにする</button>
    </div>

    <!-- 入力用画面（最初は非表示） -->
    <div class="container" id="input-container" style="display:none;">
        <h2>【入力モード】</h2>
        <p>暗号を入力せよ：</p>
        <!-- onkeyupで、文字を打ち込むたびにsendData関数を呼び出す -->
        <input type="text" id="secret-input" placeholder="ここに入力..." onkeyup="sendData()">
    </div>

    <!-- 表示用画面（最初は非表示） -->
    <div class="container" id="display-container" style="display:none;">
        <h2>【モニターモード】</h2>
        <p>受信データ：</p>
        <div id="display-area"></div>
    </div>

    <script>
        // ① ボタンを押したときに画面を切り替える処理
        function setMode(mode) {
            document.getElementById('mode-selection').style.display = 'none'; // ボタンを隠す

            if (mode === 'input') {
                document.getElementById('input-container').style.display = 'block';
                // 入力画面になったら、以前のデータをリセットする
                localStorage.setItem('secretCode', ''); 
            } else {
                document.getElementById('display-container').style.display = 'block';
                document.getElementById('display-area').innerText = ''; 
            }
        }

        // ② 入力された文字をブラウザの記憶領域（localStorage）に保存する処理
        function sendData() {
            const text = document.getElementById('secret-input').value;
            localStorage.setItem('secretCode', text);
        }

        // ③ ブラウザの記憶領域が更新されたら、表示用画面の文字を書き換える処理
        window.addEventListener('storage', function(e) {
            if (e.key === 'secretCode') {
                document.getElementById('display-area').innerText = e.newValue;
            }
        });
    </script>
</body>
</html>
