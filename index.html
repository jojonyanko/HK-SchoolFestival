<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学園祭・リアルタイム暗号通信（マルチペア版）</title>
    <style>
        body {
            background-color: #FFD7A3;
            color: #854D4E;
            font-family: 'Courier New', monospace;
            text-align: center;
            margin-top: 50px;
        }
        .container {
            border: 2px solid #854D4E;
            padding: 40px;
            display: inline-block;
            border-radius: 10px;
            min-width: 400px;
            background-color: #FFD7A3;
            box-sizing: border-box;
        }
        input[type="text"], input[type="number"] {
            background-color: #FFD7A3;
            color: #854D4E;
            border: 1px solid #854D4E;
            font-size: 24px;
            padding: 10px;
            text-align: center;
            border-radius: 5px;
        }
        input[type="text"] {
            width: 90%;
            margin-bottom: 20px;
        }
        input[type="number"] {
            width: 120px;
            margin-bottom: 20px;
        }
        #display-area {
            font-size: 48px;
            min-height: 80px;
            letter-spacing: 5px;
            text-shadow: 0 0 10px #854D4E;
            word-wrap: break-word;
        }
        .mode-switch {
            margin-bottom: 30px;
        }
        .mode-switch p {
            margin-bottom: 5px;
            font-size: 18px;
        }
        button {
            background-color: #FFD7A3;
            color: #854D4E;
            border: 1px solid #854D4E;
            padding: 15px 20px;
            cursor: pointer;
            font-size: 16px;
            margin: 10px;
            border-radius: 5px;
        }
        button:hover {
            background-color: #FFD7A3;
        }
    </style>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>

    <!-- <h1>-- 暗号通信システム --</h1> -->

    <div class="container" id="mode-selection">
        <p>1. ペア番号を入力（同じペアは同じ数字）</p>
        <input type="number" id="pair-number" placeholder="例: 1" min="1"><br>
        
        <p>2. モードを選択</p>
        <button onclick="setMode('input')">入力用タブレットにする</button>
        <button onclick="setMode('display')">表示用タブレットにする</button>
    </div>

    <div class="container" id="input-container" style="display:none;">
        <h2>【入力モード - ペア <span id="input-pair-id"></span>】</h2>
        <!-- <p>暗号を入力せよ：</p> -->
        <!-- <input type="text" id="secret-input" placeholder="ここに入力..." onkeyup="sendData()"> -->
        <input type="text" id="secret-input" placeholder="ここに入力...">
        <button onclick="sendData()">送信</button>
        <font color="red" size="5">
            <span id="inputResult"></span>
        </font>
    </div>

    <div class="container" id="display-container" style="display:none;">
        <h2>【モニターモード - ペア <span id="display-pair-id"></span>】</h2>
        <p>受信データ：</p>
        <div id="display-area">受信待機中...</div>
    </div>

    <script>
        // ★★★ Firebaseの設定情報をここに貼り付けてください ★★★
        const firebaseConfig = {
            apiKey: "AIzaSyBPFyTzjPPI1MASaGH7m814Pq3nHSo6BIA",
            authDomain: "hk-schoolfestival.firebaseapp.com",
            databaseURL: "https://hk-schoolfestival-default-rtdb.firebaseio.com",
            projectId: "hk-schoolfestival",
            storageBucket: "hk-schoolfestival.firebasestorage.app",
            messagingSenderId: "890932163893",
            appId: "1:890932163893:web:5e2e257561a3ec63e9c87c"
        };

        // Firebaseの初期化
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // 選択されたペア番号を記憶する変数
        let pairNumber = "";
        let lastText = "";

        function playBeepSound() {
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                const audioCtx = new AudioContext();
                
                // 1音目（ポ）: 少し低めの音を短く
                const osc1 = audioCtx.createOscillator();
                const gain1 = audioCtx.createGain();
                osc1.type = 'sine';
                osc1.frequency.setValueAtTime(950, audioCtx.currentTime); 
                gain1.gain.setValueAtTime(0.04, audioCtx.currentTime);
                // 0.08秒で滑らかに音量をゼロにする
                gain1.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.08);
                osc1.connect(gain1);
                gain1.connect(audioCtx.destination);
                osc1.start();
                osc1.stop(audioCtx.currentTime + 0.08);

                // 2音目（ローン）: 0.06秒後に、1音目より高い音を余韻を残して鳴らす
                const osc2 = audioCtx.createOscillator();
                const gain2 = audioCtx.createGain();
                osc2.type = 'sine';
                osc2.frequency.setValueAtTime(1250, audioCtx.currentTime + 0.06); 
                gain2.gain.setValueAtTime(0.04, audioCtx.currentTime + 0.06);
                // 0.4秒かけて綺麗にフェードアウト（消えていく余韻を作る）
                gain2.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.4);
                osc2.connect(gain2);
                gain2.connect(audioCtx.destination);
                osc2.start(audioCtx.currentTime + 0.06);
                osc2.stop(audioCtx.currentTime + 0.4);
            } catch (e) {
                console.log("オーディオ再生エラー:", e);
            }
        }

        // モード切替
        function setMode(mode) {
            // 入力されたペア番号を取得
            pairNumber = document.getElementById('pair-number').value.trim();
            
            // 番号が空っぽなら進ませない
            if (!pairNumber) {
                alert("ペア番号（数字）を入力してください！");
                return;
            }

            // 選択画面を隠す
            document.getElementById('mode-selection').style.display = 'none';

            // 【ここがポイント】データベース内の保存先を「pairs/ペア番号」の階層にする
            const pairRef = database.ref('pairs/' + pairNumber);

            if (mode === 'input') {
                document.getElementById('input-pair-id').innerText = pairNumber;
                document.getElementById('input-container').style.display = 'block';
                pairRef.set({ secretCode: '' }); // そのペアのデータを初期化
            } else {
                document.getElementById('display-pair-id').innerText = pairNumber;
                document.getElementById('display-container').style.display = 'block';
                
                // そのペアのデータだけをリアルタイム監視
                pairRef.on('value', function(snapshot) {
                    const data = snapshot.val();
                    const currentText = (data && data.secretCode) ? data.secretCode : '';
                    document.getElementById('display-area').innerText = (data && data.secretCode) ? data.secretCode : '';
                    
                    if (currentText && currentText !== lastText) {
                        playBeepSound();
                    }
                    lastText = currentText; // 今回のデータを記憶
                });
            }
        }

        // データを送信する処理
        function sendData() {
            const text = document.getElementById('secret-input').value;
            const inputResult = document.getElementById('inputResult');
            if (text == "924" || text == ""){
                inputResult.style.display = 'none'
            // 自分のペア番号の場所だけにデータを書き込む
                database.ref('pairs/' + pairNumber).set({
                    secretCode: text
                });
            } else {
                inputResult.style.display = 'block'
                inputResult.textContent = "入力値が間違っています"
            }
        }
    </script>
</body>
</html>
